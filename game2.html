<div class="content">
    <h1>TRACKER TRAINER</h1>
    <li><a href="8.html">BACK</a></li>
    <canvas id="c" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// images
const imgs = ["b1.png","b2.png","b3.png","b4.png"].map(s => {
  const i = new Image();
  i.src = s;
  return i;
});

const bg = new Image();
bg.src = "b5.png";

let target = {
  x: 200,
  y: 200,
  size: 80,
  img: 0,
  vx: 2,
  vy: 2
};

let score = 0;
let misses = 0;

let spawnTime = Date.now();
let reactionTimes = [];

function spawn() {
  target.x = Math.random() * (canvas.width - 80);
  target.y = Math.random() * (canvas.height - 80);
  target.img = Math.floor(Math.random() * imgs.length);

  target.vx = (Math.random() * 4 - 2);
  target.vy = (Math.random() * 4 - 2);

  spawnTime = Date.now();
}

canvas.addEventListener("click", (e) => {
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left;
  const my = e.clientY - r.top;

  if (
    mx > target.x &&
    mx < target.x + target.size &&
    my > target.y &&
    my < target.y + target.size
  ) {
    score++;

    const rt = Date.now() - spawnTime;
    reactionTimes.push(rt);

    spawn();
  } else {
    misses++;
  }
});

function update() {
  target.x += target.vx;
  target.y += target.vy;

  // bounce
  if (target.x < 0 || target.x > canvas.width - target.size) target.vx *= -1;
  if (target.y < 0 || target.y > canvas.height - target.size) target.vy *= -1;
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // background
  if (bg.complete) {
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
  }

  update();

  // target
  const img = imgs[target.img];
  if (img.complete) {
    ctx.drawImage(img, target.x, target.y, target.size, target.size);
  }

  // stats
  ctx.fillStyle = "black";
  ctx.fillText("Score: " + score, 10, 20);
  ctx.fillText("Misses: " + misses, 10, 40);

  const avg = reactionTimes.length
    ? (reactionTimes.reduce((a,b)=>a+b,0) / reactionTimes.length).toFixed(0)
    : 0;

  ctx.fillText("Avg Reaction: " + avg + " ms", 10, 60);

  requestAnimationFrame(draw);
}

spawn();
draw();
</script>
