    <h1>AIM TRAINER</h1>
<li><a href="8.html">BACK</a></li>
    <canvas id="c" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// target images
const imgs = ["b1.png","b2.png","b3.png","b4.png"].map(src => {
  const i = new Image();
  i.src = src;
  return i;
});

// background image
const bg = new Image();
bg.src = "b5.png";

let target = { x: 200, y: 200, size: 80, img: 0 };
let score = 0;

function spawn() {
  target.x = Math.random() * (canvas.width - 80);
  target.y = Math.random() * (canvas.height - 80);
  target.img = Math.floor(Math.random() * imgs.length);
}

canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (
    mx > target.x &&
    mx < target.x + target.size &&
    my > target.y &&
    my < target.y + target.size
  ) {
    score++;
    spawn();
  }
});

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // draw background
  if (bg.complete) {
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
  }

  // score
  ctx.fillStyle = "black";
  ctx.fillText("Score: " + score, 10, 20);

  // target
  const img = imgs[target.img];
  if (img.complete) {
    ctx.drawImage(img, target.x, target.y, target.size, target.size);
  }

  requestAnimationFrame(draw);
}

spawn();
draw();
</script>
